name: Golden E2E Windows Experiment

on:
  pull_request:
    paths:
      - '.github/workflows/golden-e2e-windows-experiment.yml'
      - 'package.json'
      - 'tests/e2e/golden-core-flows.spec.ts'
      - 'tests/e2e/helpers/**'
      - 'src/renderer/src/components/sidebar/SidebarHeader.tsx'
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to check out (defaults to the workflow ref)
        required: false
        type: string

jobs:
  golden-e2e-windows:
    name: golden e2e windows experiment
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app for E2E
        run: npx electron-vite build --mode e2e

      - name: Run golden E2E tests on Windows
        shell: pwsh
        run: |
          $env:SKIP_BUILD = '1'
          $env:ORCA_E2E_FORWARD_APP_LOGS = '1'
          pnpm test:e2e:golden

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: golden-windows-playwright-traces
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
