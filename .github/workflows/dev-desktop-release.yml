name: Dev Desktop Release

on:
  push:
    branches:
      - dev
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: dev-desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.repository == 'sbkim/orca' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve immutable dev release identity
        id: release
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(node -p "require('./package.json').version.split('-')[0]")"
          short_sha="$(git rev-parse --short=8 "$GITHUB_SHA")"
          version="${base_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          tag="desktop-v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-15
            command: pnpm build:mac
            artifact_paths: |
              dist/*.dmg
              dist/*.zip
          - platform: windows
            os: windows-2022
            command: pnpm build:win
            artifact_paths: dist/*.exe
          - platform: linux
            os: ubuntu-latest
            command: pnpm build:linux
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      # Why: unsigned fork builds must never consume the official signed update channel.
      ORCA_DISABLE_AUTO_UPDATE: '1'
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Use external node-gyp on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          npm install -g node-gyp@11.5.0
          echo "npm_config_node_gyp=$(npm root -g)/node-gyp/bin/node-gyp.js" >> "$GITHUB_ENV"

      - name: Install Linux package dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 python3-gi gir1.2-atspi-2.0 at-spi2-core xclip xdotool zlib1g-dev

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: Stamp dev package version
        env:
          DEV_VERSION: ${{ needs.prepare.outputs.version }}
        run: node -e "const fs=require('node:fs');const path='package.json';const pkg=JSON.parse(fs.readFileSync(path,'utf8'));pkg.version=process.env.DEV_VERSION;fs.writeFileSync(path,JSON.stringify(pkg,null,2)+'\n')"

      - name: Build unsigned ${{ matrix.platform }} packages
        run: ${{ matrix.command }}

      - name: Upload ${{ matrix.platform }} packages
        uses: actions/upload-artifact@v7
        with:
          name: dev-desktop-${{ matrix.platform }}-${{ needs.prepare.outputs.tag }}
          path: ${{ matrix.artifact_paths }}
          retention-days: 14
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform packages
        uses: actions/download-artifact@v8
        with:
          pattern: dev-desktop-*-${{ needs.prepare.outputs.tag }}
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish fork dev prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Why: a rerun must replace only its own incomplete immutable release.
            gh release delete "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          fi

          notes_file="$RUNNER_TEMP/dev-release-notes.md"
          {
            echo "Automated unsigned desktop build from \`dev\`."
            echo
            echo "- Version: \`$RELEASE_VERSION\`"
            echo "- Commit: \`$RELEASE_SHA\`"
            echo "- Platforms: macOS, Windows, Linux"
            echo "- Auto-update: disabled"
            echo
            echo "> These development artifacts are not Apple-notarized or Windows code-signed. Expect operating-system security warnings."
          } > "$notes_file"

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_SHA" \
            --title "Orca Desktop $RELEASE_VERSION" \
            --notes-file "$notes_file" \
            --draft \
            --prerelease
          gh release upload "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease=true \
            --latest=false
